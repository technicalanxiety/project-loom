name: Build and publish Docker images

on:
  push:
    branches: [main]

env:
  ENGINE_IMAGE: ghcr.io/technicalanxiety/project-loom/engine
  DASHBOARD_IMAGE: ghcr.io/technicalanxiety/project-loom/dashboard
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-engine:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./loom-engine
          push: true
          tags: |
            ${{ env.ENGINE_IMAGE }}:latest
            ${{ env.ENGINE_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=engine
          cache-to: type=gha,mode=max,scope=engine

  build-dashboard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./loom-dashboard
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:latest
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard
