services:
  # ─── PostgreSQL 17 with pgvector ────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: loom
      POSTGRES_PASSWORD: loom
      POSTGRES_DB: loom
    # Port 5432 is internal only — no host mapping.
    # Access postgres via the loom-net Docker network.
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loom -d loom"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - loom-net

  # ─── Ollama (Local LLM Inference) — opt-in ────────────────
  # This service is gated behind the `with-docker-ollama` profile. On
  # Apple Silicon Macs the right setup is native Ollama (brew install
  # ollama) because Docker cannot pass through Metal / MPS — a Dockered
  # Ollama runs CPU-only, needs 3-5x more memory, and is dramatically
  # slower than a native install talking to the same container stack
  # via host.docker.internal:11434.
  #
  # Native path (default):
  #   brew install ollama && ollama serve
  #   ollama pull gemma4:e4b
  #   ollama pull nomic-embed-text
  #   ollama pull gemma4:26b              # optional; tight fit under 16GB
  #   # .env should set OLLAMA_URL=http://host.docker.internal:11434
  #
  # Docker path (Linux / CUDA hosts):
  #   docker compose --profile with-docker-ollama up -d
  #   docker compose exec ollama ollama pull gemma4:e4b
  #   docker compose exec ollama ollama pull nomic-embed-text
  #   docker compose exec ollama ollama pull gemma4:26b
  #   # .env should set OLLAMA_URL=http://ollama:11434
  ollama:
    profiles: ["with-docker-ollama"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - loom-net

  # ─── Loom Engine (Rust Binary) ─────────────────────────────
  loom-engine:
    image: ghcr.io/technicalanxiety/project-loom/engine:latest
    pull_policy: always
    env_file: .env
    environment:
      # Explicit Docker-internal hostnames override any .env values.
      # OLLAMA_URL is NOT overridden here so .env can pick between the
      # native (host.docker.internal) and dockered (ollama) paths.
      DATABASE_URL: "postgres://loom:loom@postgres:5432/loom"
      DATABASE_URL_ONLINE: "postgres://loom:loom@postgres:5432/loom"
      DATABASE_URL_OFFLINE: "postgres://loom:loom@postgres:5432/loom"
      ONLINE_POOL_MAX: "10"
      OFFLINE_POOL_MAX: "5"
      LOOM_HOST: "0.0.0.0"
      LOOM_PORT: "8080"
    ports:
      - "8080:8080"
    # depends_on does NOT include ollama: when Ollama runs natively on
    # the host, the engine has no local container to wait for. The LLM
    # client has retry + Azure-fallback logic, and /api/health reports
    # Ollama status as degraded rather than failing startup.
    # On Linux, host.docker.internal is not injected automatically.
    # This maps it to the host gateway so the engine can reach native Ollama.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loom-net

  # ─── Loom Dashboard (React SPA) ───────────────────────────
  loom-dashboard:
    image: ghcr.io/technicalanxiety/project-loom/dashboard:latest
    pull_policy: always
    volumes:
      - dashboard_dist:/app/dist
    networks:
      - loom-net

  # ─── Caddy (Reverse Proxy + TLS + Static Files) ───────────
  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    environment:
      # Caddy injects this as `Authorization: Bearer <token>` on
      # /dashboard/api/* requests so the in-browser SPA doesn't need to
      # manage a token. External clients calling /mcp/* or /api/* must
      # still provide their own Authorization header.
      LOOM_BEARER_TOKEN: "${LOOM_BEARER_TOKEN}"
      # Public address the deployment is reachable at. Caddy uses this to
      # provision a TLS cert for the right hostname and as the default_sni
      # for clients that don't send SNI (Chrome w/ IP literals, curl, etc).
      # Unlike loom-engine, caddy is NOT overridden — it needs the real
      # public value from .env.
      LOOM_HOST: "${LOOM_HOST:-localhost}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - dashboard_dist:/srv/dashboard:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      loom-engine:
        condition: service_healthy
      loom-dashboard:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:443"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loom-net

volumes:
  pgdata:
  ollama_data:
  dashboard_dist:
  caddy_data:
  caddy_config:

networks:
  loom-net:
    driver: bridge
