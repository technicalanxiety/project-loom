## cargo-nextest configuration for loom-engine
## Install: cargo install cargo-nextest
## Run: cargo nextest run

[profile.default]
## Run tests in parallel, up to available CPU cores
test-threads = "num-cpus"
## Fail fast — stop on first failure during development
fail-fast = true
## Retry flaky tests once before marking as failed
retries = 1

[profile.ci]
## CI profile — no retries, all tests must pass cleanly
fail-fast = false
retries = 0
## JUnit output for CI reporting
junit.path = "target/nextest/ci/junit.xml"

[profile.integration]
## Integration test profile — longer timeouts for DB tests
slow-timeout = { period = "60s", terminate-after = 2 }
test-threads = 4
